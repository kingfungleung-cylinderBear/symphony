<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Sign-Up - Symphony Christian Care Group</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .emoji {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 30px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }
        
        .table-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        th {
            background: rgba(255, 255, 255, 0.2);
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        td {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .date-cell {
            font-weight: 600;
            font-size: 1rem;
        }
        
        .signup-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
        }
        
        .volunteer-name {
            color: #4ade80;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .modal h2 {
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        
        .modal input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            margin-bottom: 20px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .modal-btn.primary {
            background: linear-gradient(135deg, #ff8c42 0%, #ff6b35 100%);
            color: white;
        }
        
        .modal-btn.secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .modal-btn:hover {
            transform: translateY(-2px);
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.3);
            border: 2px solid rgba(76, 175, 80, 0.6);
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.3);
            border: 2px solid rgba(239, 68, 68, 0.6);
        }
        
        @media (max-width: 768px) {
            table {
                font-size: 0.9rem;
            }
            
            th, td {
                padding: 10px 5px;
            }
            
            .signup-btn {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }

        /* Mobile card layout */
        #mobileCards {
            display: none;
        }
        
        @media (max-width: 768px) {
            #scheduleTable {
                display: none !important;
            }
            
            #mobileCards {
                display: block !important;
            }
            
            .subtitle {
                font-size: 1rem;
            }
        }
        
        .date-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .date-card-header {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        
        .role-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .role-item:last-child {
            border-bottom: none;
        }
        
        .role-name {
            font-size: 1.1rem;
            font-weight: 500;
            flex: 1;
        }
        
        .role-item .signup-btn {
            padding: 10px 20px;
            font-size: 0.95rem;
            min-width: 90px;
        }
        
        .role-item .volunteer-name {
            font-size: 1.05rem;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">← Back to Home</a>
        
        <div class="header">
            <div class="emoji">📅</div>
            <h1>Volunteer Sign-Up</h1>
            <p class="subtitle">Next 10 Thursday Meetups</p>
        </div>
        
        <div class="table-container">
            <div id="messageBox" class="message"></div>
            <div id="loading" class="loading">Loading schedule...</div>
            <table id="scheduleTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Worship Songs</th>
                        <th>Opening Prayer</th>
                        <th>Bible Study</th>
                        <th>Closing Prayer</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                </tbody>
            </table>
            
            <!-- Mobile Card Layout -->
            <div id="mobileCards"></div>
        </div>
    </div>
    
    <!-- Modal for name input -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <h2>Sign Up</h2>
            <p id="modalDetails" style="margin-bottom: 20px; opacity: 0.9;"></p>
            <input type="text" id="nameInput" placeholder="Enter your full name" autofocus>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
                <button class="modal-btn primary" onclick="submitSignup()">Sign Me Up!</button>
            </div>
        </div>
    </div>
    
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-NSP9UHhxwy96j2NzHTsGAMp31Mz5ngHys2FZjjLAxGxS_NeupOHTa9WxZ_EJd4ov/exec';
        
        // Hardcoded dates (same as signup.html)
        const DATES = [
            '2026-05-07',
            '2026-05-14',
            '2026-05-21',
            '2026-06-04',
            '2026-06-11',
            '2026-06-18',
            '2026-07-09'
        ];
        
        const ROLES = ['Worship Songs', 'Opening Prayer', 'Bible Study', 'Closing Prayer'];
        
        let currentSignupDate = '';
        let currentSignupRole = '';
        let signupsData = {};
        
        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }
        
        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';
            
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 5000);
        }
        
        async function loadSchedule() {
            try {
                const response = await fetch(SCRIPT_URL + '?action=getSignups');
                const data = await response.json();
                
                if (data.success) {
                    // Organize signups by date and role
                    signupsData = {};
                    data.signups.forEach(signup => {
                        const key = `${signup.date}|${signup.role}`;
                        signupsData[key] = signup.name;
                    });
                    
                    renderTable();
                } else {
                    showMessage('Error loading schedule', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Could not load schedule. Please refresh.', 'error');
            }
        }
        
        function renderTable() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';
            
            DATES.forEach(date => {
                const row = document.createElement('tr');
                
                // Date column
                const dateCell = document.createElement('td');
                dateCell.className = 'date-cell';
                dateCell.textContent = formatDate(date);
                row.appendChild(dateCell);
                
                // Role columns
                ROLES.forEach(role => {
                    const cell = document.createElement('td');
                    const key = `${date}|${role}`;
                    
                    if (signupsData[key]) {
                        // Show volunteer name
                        cell.innerHTML = `<span class="volunteer-name">${signupsData[key]}</span>`;
                    } else {
                        // Show sign-up button
                        const btn = document.createElement('button');
                        btn.className = 'signup-btn';
                        btn.textContent = 'Sign Up';
                        btn.onclick = () => openSignupModal(date, role);
                        cell.appendChild(btn);
                    }
                    
                    row.appendChild(cell);
                });
                
                tbody.appendChild(row);
            });
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('scheduleTable').style.display = 'table';
            renderMobileCards();
        }
        
        function renderMobileCards() {
            const container = document.getElementById('mobileCards');
            container.innerHTML = '';
            
            DATES.forEach(date => {
                const card = document.createElement('div');
                card.className = 'date-card';
                
                const header = document.createElement('div');
                header.className = 'date-card-header';
                header.textContent = formatDate(date);
                card.appendChild(header);
                
                ROLES.forEach(role => {
                    const item = document.createElement('div');
                    item.className = 'role-item';
                    
                    const roleName = document.createElement('div');
                    roleName.className = 'role-name';
                    roleName.textContent = role;
                    item.appendChild(roleName);
                    
                    const key = `${date}|${role}`;
                    
                    if (signupsData[key]) {
                        const volunteerSpan = document.createElement('span');
                        volunteerSpan.className = 'volunteer-name';
                        volunteerSpan.textContent = signupsData[key];
                        item.appendChild(volunteerSpan);
                    } else {
                        const btn = document.createElement('button');
                        btn.className = 'signup-btn';
                        btn.textContent = 'Sign Up';
                        btn.onclick = () => openSignupModal(date, role);
                        item.appendChild(btn);
                    }
                    
                    card.appendChild(item);
                });
                
                container.appendChild(card);
            });
        }
        
        function openSignupModal(date, role) {
            currentSignupDate = date;
            currentSignupRole = role;
            
            document.getElementById('modalDetails').textContent = 
                `${role} on ${formatDate(date)}`;
            document.getElementById('nameInput').value = '';
            document.getElementById('signupModal').classList.add('active');
            document.getElementById('nameInput').focus();
        }
        
        function closeModal() {
            document.getElementById('signupModal').classList.remove('active');
        }
        
        async function submitSignup() {
            const name = document.getElementById('nameInput').value.trim();
            
            if (!name) {
                alert('Please enter your name');
                return;
            }
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        date: currentSignupDate,
                        role: currentSignupRole
                    })
                });
                
                closeModal();
                showMessage('✅ Sign-up submitted! Refreshing schedule...', 'success');
                
                // Refresh the schedule after a short delay
                setTimeout(() => {
                    loadSchedule();
                }, 1000);
                
            } catch (error) {
                console.error('Error:', error);
                closeModal();
                showMessage('❌ Error submitting sign-up. Please try again.', 'error');
            }
        }
        
        // Enter key submits
        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitSignup();
            }
        });
        
        // Load schedule on page load
        loadSchedule();
    </script>
</body>
</html>
